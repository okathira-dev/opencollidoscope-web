version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1000
    versioning-strategy: "increase"
    cooldown:
      default-days: 3
    include:
      - "*"
    groups:
      react-core:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      emotion:
        patterns:
          - "@emotion/*"
      mui:
        patterns:
          - "@mui/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      biome:
        patterns:
          - "@biomejs/biome"
      vitest:
        patterns:
          - "vitest"
      typescript:
        patterns:
          - "typescript"
      tone:
        patterns:
          - "tone"
      zustand:
        patterns:
          - "zustand"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1000
    cooldown:
      default-days: 3
    include:
      - "*"
    groups:
      github-actions-core:
        patterns:
          - "actions/*"
      github-actions-third-party:
        patterns:
          - "pnpm/action-setup"
          - "flatt-security/setup-takumi-guard-npm"
